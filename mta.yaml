_schema-version: 3.3.0
ID: student_management_training
version: 1.0.0
description: "A simple CAP project."
parameters:
  enable-parallel-deployments: true
  deploy_mode: html5-repo
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production
modules:
  - name: student_management_training-srv
    type: nodejs
    path: gen/srv
    parameters:
      instances: 1
      buildpack: nodejs_buildpack
    build-parameters:
      builder: npm-ci
    provides:
      - name: srv-api # required by consumers of CAP services (e.g. approuter)
        properties:
          srv-url: ${default-url}
    requires:
      - name: student_management_training-auth
      - name: student_management_training-db
      - name: student_management_training-destination

  - name: student_management_training-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: student_management_training-db

  - name: student_management_training-app-deployer
    type: com.sap.application.content
    path: gen
    requires:
      - name: student_management_training-auth
      - name: srv-api
      - name: student_management_training-html5-repo-host
        parameters:
          content-target: true
          config:
            HTML5Runtime_enabled: true
    build-parameters:
      build-result: app/
      requires:
        - name: student_management_trainingcourse_ui_app
          artifacts:
            - course_ui_app.zip
          target-path: app/
        - name: student_management_trainingfreestyle_ui5_app
          artifacts:
            - freestyle_ui5_app.zip
          target-path: app/

  - name: student_management_trainingcourse_ui_app
    type: html5
    path: app/course_ui_app
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms:
        []
  - name: student_management_trainingfreestyle_ui5_app
    type: html5
    path: app/freestyle_ui5_app
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms:
        []

  - name: student_management_training-destinations
    type: com.sap.application.content
    requires:
      - name: student_management_training-auth
        parameters:
          service-key:
            name: student_management_training-auth-key
      - name: student_management_training-html5-repo-host
        parameters:
          service-key:
            name: student_management_training-html5-repo-host-key
      - name: srv-api
      - name: student_management_training-destination
        parameters:
          content-target: true
    build-parameters:
      no-source: true
    parameters:
      content:
        instance:
          existing_destinations_policy: update
          destinations:
            - Name: student_management_training-html5-repository
              ServiceInstanceName: student_management_training-html5-repo-host
              ServiceKeyName: student_management_training-html5-repo-host-key
              sap.cloud.service: student_management_training.service
            - Name: student_management_training-auth
              Authentication: OAuth2UserTokenExchange
              ServiceInstanceName: student_management_training-auth
              ServiceKeyName: student_management_training-auth-key
              sap.cloud.service: student_management_training.service

resources:
  - name: student_management_training-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: student_management_training-${org}-${space}
        tenant-mode: dedicated
        oauth2-configuration:
          credential-types:
            - "binding-secret"
            - "x509"
        role-collections:
          - name: 'AdminPerson (student_management_training ${org}-${space})'
            description: 'generated'
            role-template-references:
              - '$XSAPPNAME.AdminPerson'
          - name: 'Student (student_management_training ${org}-${space})'
            description: 'generated'
            role-template-references:
              - '$XSAPPNAME.Student'
  - name: student_management_training-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
  - name: student_management_training-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite
      config:
        HTML5Runtime_enabled: true
        init_data:
          instance:
            existing_destinations_policy: update
            destinations:
              - Name: srv-api
                URL: ~{srv-api/srv-url}
                Authentication: NoAuthentication
                Type: HTTP
                ProxyType: Internet
                HTML5.ForwardAuthToken: true
                HTML5.DynamicDestination: true
    requires:
      - name: srv-api

  - name: student_management_training-html5-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host
